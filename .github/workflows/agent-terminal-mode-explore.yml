name: Agent terminal mode exploration

on:
  push:
    branches:
      - agent/windows-terminal-modes

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/windows-terminal-modes
      - name: Build inspection report
        run: |
          {
            echo '# Terminal mode integration report'
            echo
            echo '## Electron shell helpers'
            grep -n "function terminalShellCommand\|function terminalShellEnv\|function safeTerminalCwd\|function resolveHermesBackend\|function startHermes" apps/desktop/electron/main.ts || true
            echo
            echo '## Backend environment wiring'
            grep -n "TERMINAL_CWD\|buildDesktopBackendEnv" apps/desktop/electron/main.ts | head -120 || true
            echo
            echo '## Renderer integration'
            grep -RIn "hermesDesktop\.terminal\.start\|terminalApi\.start\|TerminalRail" apps/desktop/src/app/right-sidebar/terminal apps/desktop/src/global.d.ts | head -160 || true
            echo
            echo '## Python local environment'
            grep -n "def _run_bash\|def _find_bash\|class LocalEnvironment\|spawn_local" tools/environments/local.py | head -160 || true
            echo
            echo '## Relevant tests'
            find apps/desktop -path '*test*' -type f | grep -E 'terminal|windows|wsl' | head -160 || true
            find tests -type f | grep -E 'terminal|windows|wsl|local_environment' | head -160 || true
          } > agent-terminal-mode-report.md
      - name: Commit report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add agent-terminal-mode-report.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: add terminal mode inspection report"
          git push
